kind = "web"
previewPath = "/"
title = "NOVEX Solutions"
version = "1.0.0"
id = "artifacts/novex-solutions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24911

[services.development]
run = "pnpm --filter @workspace/novex-solutions run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/novex-solutions", "run", "build" ]
publicDir = "artifacts/novex-solutions/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24911"
BASE_PATH = "/"
